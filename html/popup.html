<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>YouTube Snapshot Settings</title>
    <link rel="stylesheet" href="../css/popup.css" />
  </head>

  <body>
    <h1>Snapshot Settings</h1>

    <!-- Snapshot Output -->
    <div class="section">
      <div class="section-title">Snapshot</div>
      <div class="setting">
        <label for="clipboardOption">Save to Clipboard</label>
        <input type="checkbox" id="clipboardOption" />
      </div>
      <div class="setting" id="fileOption_div">
        <label for="fileOption">Save as File</label>
        <input type="checkbox" id="fileOption" checked />
      </div>
      <div class="setting" id="formatSetting" style="display: none">
        <label for="formatOption">File Format</label>
        <select id="formatOption">
          <option value="png">PNG</option>
          <option value="jpg">JPG</option>
        </select>
      </div>
      <div class="setting" id="qualitySetting" style="display: none">
        <label for="qualitySlider">JPG Quality</label>
        <div class="slider-group">
          <input type="range" id="qualitySlider" min="10" max="100" step="5" value="92" />
          <span id="qualityValue" class="slider-value">92%</span>
        </div>
      </div>
      <div id="outputWarning" class="warning-text warning-text--error" style="display: none">
        Enable at least one output option
      </div>
    </div>

    <!-- GIF Settings -->
    <div class="section">
      <div class="section-title">GIF</div>
      <div class="setting">
        <label for="gifFramerate">Framerate</label>
        <div class="slider-group">
          <input type="range" id="gifFramerate" min="5" max="20" step="1" value="10" />
          <span id="framerateValue" class="slider-value">10 fps</span>
        </div>
      </div>
      <div class="setting">
        <label for="gifMaxDuration">Max Duration</label>
        <div class="slider-group">
          <input type="range" id="gifMaxDuration" min="5" max="60" step="5" value="30" />
          <span id="durationValue" class="slider-value">30s</span>
        </div>
      </div>
      <div class="setting">
        <label for="gifMaxWidth">Frame Width</label>
        <select id="gifMaxWidth">
          <option value="480">480px</option>
          <option value="720">720px</option>
          <option value="0" selected>Source</option>
        </select>
      </div>
      <div id="gifEstimate" class="estimate-text"></div>
      <div id="gifWarning" class="warning-text warning-text--caution" style="display: none">
        Processing may be slow at this size
      </div>
    </div>

    <!-- General -->
    <div class="section">
      <div class="section-title">General</div>
      <div class="setting">
        <label for="soundOption">Disable Sound</label>
        <input type="checkbox" id="soundOption" />
      </div>
    </div>

    <!-- Keyboard Shortcuts -->
    <div class="section">
      <div class="section-title">Keyboard Shortcuts</div>
      <div class="setting">
        <span class="info-text"
          >Press <kbd>s</kbd> to take a snapshot</span
        >
      </div>
      <div class="setting">
        <span class="info-text"
          >Press <kbd>g</kbd> to start/stop recording a GIF</span
        >
      </div>
    </div>

    <footer>YouTube Snapshot v<span id="version"></span></footer>

    <script src="../js/popup.js"></script>
  </body>
</html>
