<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>YouTube Snapshot Settings</title>
    <link rel="stylesheet" href="../css/popup.css" />
    <!-- Link to external CSS file -->
  </head>

  <body>
    <h1>Snapshot Settings</h1>

    <!-- Grouped File Options -->
    <div class="section">
      <div class="section-title">Snapshot Output</div>
      <div class="setting" style="margin-bottom: 8px">
        <label for="clipboardOption">Save to Clipboard</label>
        <input type="checkbox" id="clipboardOption" />
      </div>
      <div class="setting" id="fileOption_div">
        <label for="fileOption">Save as File</label>
        <input type="checkbox" id="fileOption" checked />
      </div>
      <div class="setting" id="formatSetting" style="display: none">
        <label for="formatOption">File Format</label>
        <select id="formatOption">
          <option value="png">PNG</option>
          <option value="jpg">JPG</option>
        </select>
      </div>
      <div id="outputWarning" class="warning-text" style="display: none">
        Enable at least one output option
      </div>
    </div>

    <div class="section">
      <div class="section-title">Audio</div>
      <div class="setting">
        <label for="soundOption">Disable Sound</label>
        <input type="checkbox" id="soundOption" />
      </div>
    </div>

    <div class="section">
      <div class="section-title">Keyboard Shortcuts</div>
      <div class="setting" style="margin-bottom: 8px">
        <span class="info-text"
          >Press <kbd>s</kbd> to take a snapshot</span
        >
      </div>
      <div class="setting">
        <span class="info-text"
          >Press <kbd>g</kbd> to start/stop recording a GIF</span
        >
      </div>
    </div>

    <footer>YouTube Snapshot Extension v<span id="version"></span></footer>

    <script src="../js/popup.js"></script>
  </body>
</html>
